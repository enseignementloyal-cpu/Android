name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.1
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.1'

      - name: Fix Gradle build files
        run: |
          cat > build.gradle << 'ENDOFFILE'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://jitpack.io' }
              }
          }
          ENDOFFILE

          cat > settings.gradle << 'ENDOFFILE'
          rootProject.name = "LotatoPro"
          include ':app'
          ENDOFFILE

          cat > app/build.gradle << 'ENDOFFILE'
          apply plugin: 'com.android.application'

          android {
              namespace 'com.lotato.pro'
              compileSdk 34
              defaultConfig {
                  applicationId "com.lotato.pro"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "6.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.debug
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
              implementation 'androidx.cardview:cardview:1.0.0'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
              implementation 'com.google.code.gson:gson:2.10.1'
              implementation 'com.github.sunmi:printersdk:1.0.14'
          }
          ENDOFFILE

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lotato-pro-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
